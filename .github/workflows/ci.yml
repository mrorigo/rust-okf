name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        working-directory: rust-okf
        run: cargo fmt --check

      - name: Lint
        working-directory: rust-okf
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: rust-okf
        run: cargo test
